version: '3.8'

services:
  # ==========================================
  # 0. DISCOVERY SERVICE (EUREKA)
  # ==========================================
  discovery-service:
    build: ../backend/discovery-service
    container_name: fintrack-discovery-service
    ports:
      - "8761:8761"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=discovery-service
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # ==========================================
  # 1. INFRASTRUCTURE (DB & KAFKA)
  # ==========================================

  # Database cho Service Identity (Quản lý User)
  identity-db:
    image: postgres:16-alpine
    container_name: fintrack-identity-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=identity_service_db
    ports:
      - "5432:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data

  wallet-db:
    image: postgres:16-alpine
    container_name: fintrack-wallet-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=wallet_service_db
    ports:
      - "5433:5432"
    volumes:
      - wallet_data:/var/lib/postgresql/data

  transaction-db:
    image: postgres:16-alpine
    container_name: fintrack-transaction-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=transaction_service_db
    ports:
      - "5434:5432"
    volumes:
      - transaction_data:/var/lib/postgresql/data

  # --- TOOLS ---
  # 1. Công cụ quản lý DB (pgAdmin) - Optional nhưng nên có để dễ debug
  pgadmin:
    image: dpage/pgadmin4
    container_name: fintrack-pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@fintrack.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - identity-db
      - wallet-db
      - transaction-db

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- MESSAGE BROKER (KAFKA) ---

  # 1. Zookeeper (Quản lý Kafka Cluster)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: fintrack-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 2. Kafka Broker (Nơi chứa tin nhắn)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: fintrack-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092" # Port cho Spring Boot (Host) kết nối vào
      - "9092:9092"   # Port nội bộ
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Cấu hình để Kafka biết đường trả lời khi được gọi từ bên ngoài (localhost) và bên trong (docker)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ==========================================
  # 2. MICROSERVICES (JAVA APPS)
  # ==========================================

  # --- Identity Service ---
  identity-service:
    build: ../backend/identity-service  # Đường dẫn tới thư mục chứa code Identity
    container_name: fintrack-identity-service
    ports:
      - "8080:8080" # Map port ra ngoài để bạn test Swagger
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://identity-db:5432/identity_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - identity-db
      - discovery-service
      - redis

  # --- Wallet Service ---
  wallet-service:
    build: ../backend/wallet-service
    container_name: fintrack-wallet-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://wallet-db:5432/wallet_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - wallet-db
      - discovery-service
      - redis

  # --- Notification Service ---
  notification-service:
    build: ../backend/notification-service
    container_name: fintrack-notification-service
    ports:
      - "8083:8083"
    environment:
      # Quan trọng: Kết nối Kafka nội bộ dùng port 9092
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - kafka
      - discovery-service

  # --- Transaction Service (Trùm cuối) ---
  transaction-service:
    build: ../backend/transaction-service
    container_name: fintrack-transaction-service
    ports:
      - "8082:8082" # Để bạn vẫn test được cửa sau (Direct Access)
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://transaction-db:5432/transaction_service_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      # Cấu hình Feign Client trỏ sang container khác (Không dùng localhost)
      # Lưu ý: Feign Client trong code của bạn phải hỗ trợ đọc URL từ biến môi trường
      # Hoặc nếu bạn dùng Service Discovery thì không cần dòng này.
      # Nếu bạn đang hardcode URL trong @FeignClient, bạn phải sửa code để nhận biến này.
      - IDENTITY_SERVICE_URL=http://identity-service:8080
      - WALLET_SERVICE_URL=http://wallet-service:8081
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - transaction-db
      - kafka
      - discovery-service
      - identity-service
      - wallet-service
      - redis

  # --- API Gateway ---
  api-gateway:
    build: ../backend/api-gateway
    container_name: fintrack-api-gateway
    ports:
      - "8888:8888"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      # Gateway phải trỏ các route về tên container
      - IDENTITY_SERVICE_URI=lb://identity-service
      - TRANSACTION_SERVICE_URI=lb://transaction-service
      # Nếu gateway dùng Eureka thì không cần, nếu dùng hardcode URL thì cần sửa lại config Gateway
    depends_on:
      - identity-service
      - transaction-service
      - discovery-service

volumes:
  identity_data:
  wallet_data:
  pgadmin_data:
  transaction_data:
  redis_data: