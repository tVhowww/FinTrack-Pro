version: '3.8'

services:
  # ==========================================
  # 0. DISCOVERY SERVICE (EUREKA)
  # ==========================================
  discovery-service:
    build: ../backend/discovery-service
    container_name: fintrack-discovery-service
    ports:
      - "8761:8761"
    environment:
      - EUREKA_INSTANCE_HOSTNAME=discovery-service
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/

  # ==========================================
  # 1. INFRASTRUCTURE (DB & KAFKA)
  # ==========================================

  # Database cho Service Identity (Quản lý User)
  identity-db:
    image: postgres:16-alpine
    container_name: fintrack-identity-db
    restart: always
    environment:
      - POSTGRES_USER=${IDENTITY_DB_USER}
      - POSTGRES_PASSWORD=${IDENTITY_DB_PASSWORD}
      - POSTGRES_DB=identity_service_db
    ports:
      - "5432:5432"
    volumes:
      - identity_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IDENTITY_DB_USER} -d identity_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  wallet-db:
    image: postgres:16-alpine
    container_name: fintrack-wallet-db
    restart: always
    environment:
      - POSTGRES_USER=${WALLET_DB_USER}
      - POSTGRES_PASSWORD=${WALLET_DB_PASSWORD}
      - POSTGRES_DB=wallet_service_db
    ports:
      - "5433:5432"
    volumes:
      - wallet_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WALLET_DB_USER} -d wallet_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  transaction-db:
    image: postgres:16-alpine
    container_name: fintrack-transaction-db
    restart: always
    environment:
      - POSTGRES_USER=${TRANSACTION_DB_USER}
      - POSTGRES_PASSWORD=${TRANSACTION_DB_PASSWORD}
      - POSTGRES_DB=transaction_service_db
    ports:
      - "5434:5432"
    volumes:
      - transaction_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TRANSACTION_DB_USER} -d transaction_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- TOOLS ---
  # 1. Công cụ quản lý DB (pgAdmin) - Optional nhưng nên có để dễ debug
  pgadmin:
    image: dpage/pgadmin4
    container_name: fintrack-pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      identity-db:
        condition: service_healthy
      wallet-db:
        condition: service_healthy
      transaction-db:
        condition: service_healthy

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: fintrack-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- MESSAGE BROKER (KAFKA) ---

  # 1. Zookeeper (Quản lý Kafka Cluster)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: fintrack-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 2. Kafka Broker (Nơi chứa tin nhắn)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: fintrack-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092" # Port cho Spring Boot (Host) kết nối vào
      - "9092:9092"   # Port nội bộ
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Cấu hình để Kafka biết đường trả lời khi được gọi từ bên ngoài (localhost) và bên trong (docker)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # ==========================================
  # 2. MICROSERVICES (JAVA APPS)
  # ==========================================

  # --- Identity Service ---
  identity-service:
    build: ../backend/identity-service
    container_name: fintrack-identity-service
    ports:
      - "8080:8080"
    env_file:
      - ../backend/identity-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://identity-db:5432/identity_service_db
      - SPRING_DATASOURCE_USERNAME=${IDENTITY_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${IDENTITY_DB_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      identity-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      redis:
        condition: service_started

  # --- Wallet Service ---
  wallet-service:
    build: ../backend/wallet-service
    container_name: fintrack-wallet-service
    ports:
      - "8081:8081"
    env_file:
      - ../backend/wallet-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://wallet-db:5432/wallet_service_db
      - SPRING_DATASOURCE_USERNAME=${WALLET_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${WALLET_DB_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      wallet-db:
        condition: service_healthy
      discovery-service:
        condition: service_started
      redis:
        condition: service_started

  # --- Notification Service ---
  notification-service:
    build: ../backend/notification-service
    container_name: fintrack-notification-service
    ports:
      - "8083:8083"
    env_file:
      - ../backend/notification-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
    depends_on:
      - kafka
      - discovery-service

  # --- Transaction Service (Trùm cuối) ---
  transaction-service:
    build: ../backend/transaction-service
    container_name: fintrack-transaction-service
    ports:
      - "8082:8082"
    env_file:
      - ../backend/transaction-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://transaction-db:5432/transaction_service_db
      - SPRING_DATASOURCE_USERNAME=${TRANSACTION_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${TRANSACTION_DB_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - IDENTITY_SERVICE_URL=http://identity-service:8080
      - WALLET_SERVICE_URL=http://wallet-service:8081
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      transaction-db:
        condition: service_healthy
      kafka:
        condition: service_started
      discovery-service:
        condition: service_started
      identity-service:
        condition: service_started
      wallet-service:
        condition: service_started
      redis:
        condition: service_started

  # --- API Gateway ---
  api-gateway:
    build: ../backend/api-gateway
    container_name: fintrack-api-gateway
    ports:
      - "8888:8888"
    env_file:
      - ../backend/api-gateway/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - IDENTITY_SERVICE_URI=lb://identity-service
      - TRANSACTION_SERVICE_URI=lb://transaction-service
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      # CORS: set to your production frontend URL when deploying
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      - identity-service
      - transaction-service
      - discovery-service
      - redis

volumes:
  identity_data:
  wallet_data:
  pgadmin_data:
  transaction_data:
  redis_data: