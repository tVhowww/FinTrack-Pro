server:
  port: ${GATEWAY_PORT:8888}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            # Mỗi giây cấp cho user 10 lượt gọi API
            redis-rate-limiter.replenishRate: 10
            # Nhưng cho phép gọi dồn tối đa 20 lượt/giây (bùng nổ nhất thời)
            redis-rate-limiter.burstCapacity: 20
            # Mỗi request tiêu tốn 1 Token
            redis-rate-limiter.requestedTokens: 1
            # Bean nhận diện IP ban nãy
            key-resolver: "#{@ipKeyResolver}"

      server:
        webflux:
          routes:
            # ----------------------------------------------------
            # 1. Route Public
            # ----------------------------------------------------
            - id: identity_public
              uri: ${IDENTITY_SERVICE_URL:lb://IDENTITY-SERVICE}
              predicates:
                - Path=/identity/auth/**
              filters:
                - RemoveRequestHeader=X-Internal-Secret
                # Dùng biến config thay vì hardcode
                - AddRequestHeader=X-Internal-Secret, ${app.internal-secret}

            # ----------------------------------------------------
            # 2. Route Private (Identity)
            # ----------------------------------------------------
            - id: identity_private
              uri: ${IDENTITY_SERVICE_URL:lb://IDENTITY-SERVICE}
              predicates:
                - Path=/identity/**
              filters:
                - RemoveRequestHeader=X-Internal-Secret
                - Authentication
                - AddRequestHeader=X-Internal-Secret, ${app.internal-secret}

            # ----------------------------------------------------
            # 3. Route Wallet Service
            # ----------------------------------------------------
            - id: wallet_service
              uri: ${WALLET_SERVICE_URL:lb://WALLET-SERVICE}
              predicates:
                - Path=/wallet/wallets/**, /wallet/users/**
              filters:
                - RemoveRequestHeader=X-Internal-Secret
                - Authentication
                - AddRequestHeader=X-Internal-Secret, ${app.internal-secret}

            # ----------------------------------------------------
            # 4. Route Transaction Service
            # ----------------------------------------------------
            - id: transaction_service
              uri: ${TRANSACTION_SERVICE_URL:lb://TRANSACTION-SERVICE}
              predicates:
                - Path=/transaction/**
              filters:
                - RemoveRequestHeader=X-Internal-Secret
                - Authentication
                - AddRequestHeader=X-Internal-Secret, ${app.internal-secret}

            # ----------------------------------------------------
            # 5. Route Notification Service
            # ----------------------------------------------------
            - id: notification_service
              uri: ${NOTIFICATION_SERVICE_URL:lb://NOTIFICATION-SERVICE}
              predicates:
                - Path=/notification/**
              filters:
                - RemoveRequestHeader=X-Internal-Secret
                - Authentication
                - AddRequestHeader=X-Internal-Secret, ${app.internal-secret}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}

app:
  # Lấy giá trị từ biến môi trường vào đây
  internal-secret: ${INTERNAL_SECRET}
  # Comma-separated list of allowed CORS origins. Override with ALLOWED_ORIGINS env var.
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

logging:
  charset:
    console: UTF-8
    file: UTF-8
