server:
  port: 8081 # Chay cong khac Identity (8080)
  servlet:
    context-path: /wallet # Prefix cho API: http://localhost:8081/wallet/wallets

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  application:
    name: wallet-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/wallet_service_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
    producer: 
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      # Đổi tên group để bỏ qua message lỗi cũ
      group-id: wallet-service-group-v2
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

# Cau hinh Eureka (Service Discovery)
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

feign:
  client:
    config:
      default:
        connectTimeout: 5000 # 5s
        readTimeout: 5000

# Cau hinh Security
jwt:
  signerKey: ${JWT_SIGNER_KEY}

app:
  internal-secret: ${INTERNAL_SECRET}

  services:
    transaction:
      url: ${APP_SERVICES_TRANSACTION_URL:http://localhost:8082}

---
# ============================================================
# DEV Profile — verbose SQL logging for local development
# Activate with: SPRING_PROFILES_ACTIVE=dev 
# ============================================================
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  charset:
    console: UTF-8
    file: UTF-8
