server:
  port: 8081 # Chay cong khac Identity (8080)
  servlet:
    context-path: /wallet # Prefix cho API: http://localhost:8081/wallet/wallets

spring:
  application:
    name: wallet-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/wallet_service_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Cau hinh Eureka (Service Discovery)
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

feign:
  client:
    config:
      default:
        connectTimeout: 5000 # 5s
        readTimeout: 5000

# Cau hinh Security
jwt:
  signerKey: ${JWT_SIGNER_KEY}

app:
  internal-secret: ${INTERNAL_SECRET}