server:
  port: 8081 # Ch?y c?ng khác Identity (8080)
  servlet:
    context-path: /wallet # Prefix cho API: http://localhost:8081/wallet/wallets

spring:
  application:
    name: wallet-service

  datasource:
    url: jdbc:postgresql://localhost:5434/wallet_service_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # T? t?o b?ng khi ch?y
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# C?u h́nh Eureka (Service Discovery) - T?m th?i disable n?u ch?a d?ng Server Eureka
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

# C?u h́nh Security (Quan tr?ng nh?t)
jwt:
  signerKey: "1234567890123456789012345678901234567890123456789012345678901234"