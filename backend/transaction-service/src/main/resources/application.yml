server:
  port: 8082 # Identity: 8080, Wallet: 8081, Transaction: 8082
  servlet:
    context-path: /transaction # Base path

spring:
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/transaction_service_db}
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:29092
    producer:
      # Key là String
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # Value là Object (JSON)
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: event:com.fintrack.transaction_service.dto.event.NotificationEvent
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

# Cau hinh Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

# Cau hinh Feign Client (de goi Wallet Service)
feign:
  client:
    config:
      default:
        connectTimeout: 5000 # 5s
        readTimeout: 5000

# Cau hinh Security
jwt:
  signerKey: ${JWT_SIGNER_KEY}

app:
  internal-secret: ${INTERNAL_SECRET}