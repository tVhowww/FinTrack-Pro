server:
  port: 8082 # Identity: 8080, Wallet: 8081, Transaction: 8082
  servlet:
    context-path: /transaction # Base path

spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5434/transaction_service_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: SCRAM-SHA-256
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME:}" password="${KAFKA_PASSWORD:}";
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: transaction-service-group-v2
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
            # Dùng bản Flash cho tốc độ siêu nhanh và rẻ (chuyên đọc ảnh)
            model: gemini-2.5-flash
            # Nhiệt độ (0.0 đến 1.0) -> Set 0.2 để AI trả lời chuẩn xác logic JSON, không sáng tạo chém gió
            temperature: 0.2

# Cau hinh Eureka Client
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:true}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:true}

# Cau hinh Feign Client (de goi Wallet Service)
feign:
  client:
    config:
      default:
        connectTimeout: 5000 # 5s
        readTimeout: 5000 # 5s

# Cau hinh Security
jwt:
  signerKey: ${JWT_SIGNER_KEY}

app:
  internal-secret: ${INTERNAL_SECRET}
  exchange-rate:
    url: https://open.er-api.com/v6

---
# ============================================================
# DEV Profile — verbose SQL logging for local development
# Activate with: SPRING_PROFILES_ACTIVE=dev
# ============================================================
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
logging:
  charset:
    console: UTF-8
    file: UTF-8
