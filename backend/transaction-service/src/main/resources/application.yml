server:
  port: 8082 # Identity: 8080, Wallet: 8081, Transaction: 8082
  servlet:
    context-path: /transaction # Base path

spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:postgresql://localhost:5434/transaction_service_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Cau hinh Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

# Cau hinh Feign Client (de goi Wallet Service)
feign:
  client:
    config:
      default:
        connectTimeout: 5000 # 5s
        readTimeout: 5000