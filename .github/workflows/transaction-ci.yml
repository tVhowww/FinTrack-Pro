name: Transaction Service CI Pipeline

# Trigger khi có code push hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/transaction-service/**' # Chỉ chạy khi có thay đổi ở service này
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Cấp phát 1 máy ảo Ubuntu
    
    steps:
    # 1. Lấy code từ repo về máy ảo
    - name: Checkout Code
      uses: actions/checkout@v4
      
    # 2. Cài đặt Java 21
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Tự động cache thư viện maven cho lẹ
        
    # 3. Chạy toàn bộ Unit & Integration Test
    - name: Run Maven Tests
      working-directory: ./backend/transaction-service
      run: mvn clean test
      
    # 4. Set up Docker Buildx 
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    # 5. Đăng nhập Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    # 6. Build và Push Docker Image
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend/transaction-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fintrack-transaction-service:latest