name: Wallet Service CI Pipeline

# Trigger khi có code push hoặc tạo Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/wallet-service/**' # Chỉ chạy khi có thay đổi ở service này
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Cấp phát 1 máy ảo Ubuntu
    
    steps:
    # 1. Lấy code từ repo về máy ảo
    - name: Checkout Code
      uses: actions/checkout@v4
      
    # 2. Cài đặt Java 21
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven # Tự động cache thư viện maven cho lẹ
        
    # 3. Chạy toàn bộ Unit & Integration Test
    - name: Run Maven Tests
      working-directory: ./backend/wallet-service
      run: mvn clean package -DskipTests=false
      
    # 4. Set up Docker Buildx 
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    # 5. Đăng nhập Docker Hub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    # 6. Build và Push Docker Image
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend/wallet-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fintrack-wallet-service:latest

  deploy-to-render:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Log in to Render
      - name: Log in to Render
        run: |
          echo "Bắt đầu xác thực với Render API..."
          
      # Step 2: Deploy image from Docker Hub to Render
      - name: Deploy to Render
        run: |
          curl -X POST https://api.render.com/v1/services/srv-d87k2oe7r5hc738n22q0/deploys \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json"